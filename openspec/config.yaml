schema: spec-driven

# 项目上下文 - AI 生成产物时会参考这些信息
context: |
  语言：中文（简体）
  所有文字性产出物必须使用简体中文撰写

  # 项目概述
  项目名称：织世录
  项目类型：Web 应用
  项目概述：多智能体叙事沙盘：用户输入世界背景、人物、关系、阵营和规则；系统让世界按时间推进，角色各自行动、冲突、结盟、背叛、成长；最后把“世界运行日志”整理成小说、编年史、人物传记或章节故事。
  
  # 技术栈
  前端：Next.js + TypeScript + Tailwind CSS + shadcn/ui
  后端：Python + FastAPI + PostgreSQL + pgvector + LangGraph
  测试：pytest + pytest-asyncio + ruff + playwright
  
  # 代码规范
  - python 命名规范
    - 文件名：snake_case.py
    - 变量名：snake_case
    - 类名：PascalCase
    - 常量：UPPER_SNAKE_CASE
  - TypeScript 命名规范
    - 组件：PascalCase.tsx
    - 函数：camelCase
    - 类型：PascalCase
    - 常量：UPPER_SNAKE_CASE 
  - 分层规范：
    - API 路由里直接写 LLM prompt
    - API 路由里直接改复杂世界状态
    - Agent 里直接写数据库
    - 前端直接拼接复杂业务规则
  - 所有公共 API 需保持向后兼容

  # 提交规范
  - feat: 新功能
  - fix: 修复问题
  - refactor: 重构
  - docs: 文档
  - test: 测试
  - chore: 工程配置
  
  # 分支策略
  - main: 生产分支
  - develop: 开发分支

# 每产物规则 - 针对特定产物的额外指导
rules:
  proposal:
    - 必须包含回滚计划
    - 说明对现有功能的影响
    - 列出需要协调的团队
  specs:
    - 使用 Given/When/Then 格式编写场景
    - 优先引用现有模式，避免重复发明
    - 包含边界条件和异常场景
  design:
    - 说明关键技术决策的理由
    - 列出受影响的文件和模块
    - 考虑性能和安全影响
  tasks:
    - 任务粒度适中（每个任务约 1-2 小时工作量）
    - 按模块分组，使用层级编号
    - 包含必要的测试任务
